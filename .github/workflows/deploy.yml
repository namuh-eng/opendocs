name: Deploy (Cloudflare Workers)

# Default deploy: OpenDocs runs on Cloudflare Workers Containers via `wrangler deploy`.
#
# One-time setup:
#   1. Copy `wrangler.example.jsonc` -> `wrangler.jsonc` and fill in your
#      account_id, custom-domain route, and image_vars (your public app URL).
#   2. Add repo secret CLOUDFLARE_API_TOKEN (Workers + Containers + R2 + DNS perms;
#      requires the Workers Paid plan for Containers).
#   3. Set app secrets once: `wrangler secret put <NAME>` for DATABASE_URL,
#      OPENAI_API_KEY, BETTER_AUTH_SECRET, AUTH_GOOGLE_ID/SECRET, S3_* and STRIPE_*.
#
# Manual trigger by default. `wrangler.jsonc` is gitignored, so CI must have it
# available (commit your own, or fetch it in a prior step).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
